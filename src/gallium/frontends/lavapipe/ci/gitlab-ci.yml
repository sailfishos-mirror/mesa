include:
  - local: 'src/gallium/frontends/lavapipe/ci/gitlab-ci-inc.yml'

lavapipe-vkcts:
  timeout: 15m
  variables:
    DEQP_SUITE: lvp
    GPU_VERSION: lvp
    DEQP_FRACTION: 9
  extends:
    - .deqp-test
    - .lavapipe-test
    - .lavapipe-rules

lavapipe-vkcts-full:
  extends:
    - lavapipe-vkcts
    - .lavapipe-manual-rules
  timeout: 2h  # base runtime = 1h15m
  variables:
    DEQP_FRACTION: 1

lavapipe-vkcts-asan:
  timeout: 15m
  extends:
    - .deqp-test
    - .lavapipe-test
    - .lavapipe-rules
  variables:
    DEQP_SUITE: lvp-asan
    GPU_VERSION: lvp-asan
    DEQP_FORCE_ASAN: 1
    S3_ARTIFACT_NAME: mesa-x86_64-asan-debugoptimized
    DEQP_FRACTION: 1000
  needs:
    - job: debian/x86_64_test-vk
      optional: true
    - job: debian-x86_64-asan

lavapipe-vkcts-asan-full:
  extends:
    - lavapipe-vkcts-asan
    - .lavapipe-manual-rules
  timeout: 2h
  variables:
    DEQP_FRACTION: 40

lavapipe-vkd3d:
  extends:
    - .lavapipe-test
    - .lavapipe-rules
    - .test-vkd3d-proton
  timeout: 15m  # base runtime = 8m
  variables:
    GPU_VERSION: lvp
  script: install/vkd3d-runner.sh

lavapipe-traces:
  variables:
    REPLAY_CONFIG: traces-lavapipe.toml
    GPU_VERSION: lvp
  extends:
    - .test-vkd3d-proton
    - .traces-test
    - .test-wine
    - .lavapipe-test
    - .lavapipe-rules
  script: |
    export LD_LIBRARY_PATH="$CI_PROJECT_DIR/install/lib"
    export LIBGL_DRIVERS_PATH="$CI_PROJECT_DIR/install/lib/dri"
    section_start weston "weston: prepare"
    . "$CI_PROJECT_DIR/install/common/weston.sh"
    section_end weston
    $HWCI_TEST_SCRIPT

android-angle-lavapipe:
  variables:
    CUTTLEFISH_GPU_MODE: mesa_swrast_guest_angle
    DEQP_SUITE: android-angle-lavapipe
    GPU_VERSION: lvp-android-angle
    VK_DRIVER: lvp
  timeout: 15m
  extends:
    - .test-android
    - .lavapipe-rules
    - .test-angle

android-angle-lavapipe-cts-full:
  variables:
    CUTTLEFISH_GPU_MODE: mesa_swrast_guest_angle
    GPU_VERSION: lvp-android-angle
    VK_DRIVER: lvp
  timeout: 45m
  extends:
    - .test-android
    - .test-android-cts
    - .lavapipe-manual-rules
    - .test-angle
