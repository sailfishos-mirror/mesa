.enforce-hw-jobs-svga-rules:
  rules:
    - if: '$INPUT_HW_JOBS !~ /"(all|svga|vmwgfx.ko)"/i'
      when: never

.vmware-rules:
  stage: layered-backends
  rules:
    - !reference [.enforce-hw-jobs-svga-rules, rules]
    - !reference [.test, rules]
    - !reference [.vmware-farm-rules, rules]
    - !reference [.gl-rules, rules]
    - changes: &vmware_file_list
        - src/gallium/drivers/svga/**/*
        - src/gallium/winsys/svga/**/*
        - src/compiler/nir/**/*
        - src/gallium/auxiliary/nir/**/*
        - src/gallium/auxiliary/draw/**/*
        - src/util/**/*
      when: on_success

.vmware-manual-rules:
  stage: layered-backends-nightly
  extends: .no-auto-retry
  rules:
    - !reference [.enforce-hw-jobs-svga-rules, rules]
    - !reference [.test, rules]
    - !reference [.vmware-farm-manual-rules, rules]
    - !reference [.gl-manual-rules, rules]
    - changes: *vmware_file_list
      when: manual
