<?xml version="1.0"?>
<driconf>
    <device driver="nvk">
        <engine engine_name_match="vkd3d">
            <!--
               VKD3D really wants a min SSBO alignment of 4B instead of 16B because
               it's required for structure buffers.  If we don't do this, it'll hack
               it behind our back and we don't really want that.  We just have to trust
               it to naturally align all access.
               -->
            <option name="nvk_ssbo_align_4b" value="true" />
        </engine>

        <application name="Artifact Classic" executable="dcg">
            <option name="force_vk_vendor" value="-1" />
        </application>
        <application name="Deep Rock Galactic" executable="FSD.exe">
            <!-- Tries to use NvAPI_D3D11_CreateCubinComputeShaderWithName otherwise -->
            <option name="force_vk_vendor" value="-1" />
        </application>
        <application name="Metro Exodus (Linux native)" application_name_match="metroexodus">
            <option name="nvk_app_layer" value="metroexodus" />
        </application>
        <application name="No Man's Sky" executable="NMS.exe">
            <option name="force_vk_vendor" value="-1" />
        </application>
        <application name="X4 Foundations" executable="X4">
            <option name="force_vk_vendor" value="-1" />
        </application>
    </device>
</driconf>
